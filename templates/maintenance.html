<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReliePH - Maintenance</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='admin.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/purplehands.ico') }}">
    <style>
        .maintenance-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: url('{{ url_for("static", filename="images/signin_bg.png") }}') no-repeat center center fixed;
            background-size: cover;
            color: #333;
            text-align: center;
            padding: 2rem;
        }
        
        .maintenance-content {
            background: #ffffff;
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 3rem;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .maintenance-logo {
            width: 120px;
            height: auto;
            margin-bottom: 1rem;
        }
        
        .maintenance-title {
            font-family: 'FuturaMdBT', sans-serif;
            font-weight: 600;
            font-size: 2.2rem;
            margin-bottom: 1rem;
        }
        
        .maintenance-message {
            font-family: 'Satoshi', sans-serif;
            font-weight: 400;
            font-size: 1rem;
            margin-bottom: 2rem;
            opacity: 0.9;
        }
        
        .maintenance-time {
            font-family: 'Satoshi', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .fas {
            font-size: 2rem;
            margin-left: 1rem;
        }
    </style>
</head>
<body>
    <div class="maintenance-container">
        <div class="maintenance-content">
            <img src="{{ url_for('static', filename='images/relieph_logo.png') }}" alt="ReliePH Logo" class="maintenance-logo">
            <h1 class="maintenance-title">Under Maintenance<i class="fas fa-tools"></i></h1>
            <p class="maintenance-message">
                We're currently performing scheduled maintenance to improve your experience. 
                Please check back soon.
            </p>
            <p class="maintenance-time">
                Estimated completion: Within a few hours
            </p>
        </div>
    </div>
</body>
</html>
